schema_version: 1

context:
  version: "0.15.1"

package:
  name: jupyverse-api
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/j/jupyverse-api/jupyverse_api-${{ version }}.tar.gz
    sha256: 041004d512a4e5b8c2bd09bd24863e9da503db35e5e4364619383c6cd8e90259

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check
  python:
    entry_points:
      - jupyverse = jupyverse_api.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - anyio >=4.12.1,<5.0.0
    - fastapi-core >=0.95.0,<1.0.0
    - fps >=0.6.3,<0.7.0
    - structlog
    - pydantic >=2,<3

tests:
  - python:
      imports: jupyverse_api
  - requirements:
      run:
        - python ${{ python_min }}.*
        - rich-click
        - pip
    script:
      - pip check
      - jupyverse --help

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/api/api
  summary: The API for Jupyverse.

extra:
  recipe-maintainers:
    - davidbrochart
